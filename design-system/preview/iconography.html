<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; padding: 16px; }
  .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #5a5e78; margin-bottom: 8px; margin-top: 14px; }
  .section-label:first-child { margin-top: 0; }
  .glyph-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .glyph-cell { background: #1a1d27; border: 1px solid #2c2f45; border-radius: 6px; padding: 8px 6px; text-align: center; }
  .glyph-icon { font-size: 18px; display: block; margin-bottom: 4px; }
  .glyph-name { font-size: 9px; color: #5a5e78; }
  .logo-demo { display: flex; align-items: center; gap: 10px; }
  .logo-tile { width: 36px; height: 36px; background: linear-gradient(135deg, #3B82F6, #818cf8); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
  .logo-tile-sm { width: 22px; height: 22px; background: linear-gradient(135deg, #3B82F6, #818cf8); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; }
  .logo-name { font-size: 16px; font-weight: 700; color: #e2e4f0; }
  .logo-sub { font-size: 12px; color: #8b8fa8; }
</style>
</head>
<body>
  <div class="section-label">Logo Mark</div>
  <div class="logo-demo">
    <div class="logo-tile">◆</div>
    <div>
      <div class="logo-name">Omni-Context</div>
      <div class="logo-sub">Settings &amp; API key configuration</div>
    </div>
  </div>
  <div style="margin-top:8px;">
    <div class="logo-demo">
      <div class="logo-tile-sm">◆</div>
      <span style="font-size:13px;font-weight:600;color:#e2e4f0;letter-spacing:0.01em;">Omni-Context</span>
    </div>
  </div>

  <div class="section-label">UI Glyphs (Unicode)</div>
  <div class="glyph-grid">
    <div class="glyph-cell"><span class="glyph-icon">◆</span><div class="glyph-name">Logo ◆</div></div>
    <div class="glyph-cell"><span class="glyph-icon">⚙</span><div class="glyph-name">Settings</div></div>
    <div class="glyph-cell"><span class="glyph-icon">➤</span><div class="glyph-name">Send</div></div>
    <div class="glyph-cell"><span class="glyph-icon">▶</span><div class="glyph-name">Expand</div></div>
    <div class="glyph-cell"><span class="glyph-icon">▼</span><div class="glyph-name">Collapse</div></div>
    <div class="glyph-cell"><span class="glyph-icon">×</span><div class="glyph-name">Delete ×</div></div>
    <div class="glyph-cell"><span class="glyph-icon">↺</span><div class="glyph-name">Re-index</div></div>
    <div class="glyph-cell"><span class="glyph-icon">↗</span><div class="glyph-name">Open tab</div></div>
    <div class="glyph-cell"><span class="glyph-icon">⚠</span><div class="glyph-name">Warning</div></div>
    <div class="glyph-cell"><span class="glyph-icon">🔬</span><div class="glyph-name">Research</div></div>
  </div>

  <div class="section-label">Extension Icons</div>
  <div style="display:flex;gap:12px;align-items:center;">
    <div style="text-align:center;">
      <img src="../assets/icon128.png" width="48" height="48" style="border-radius:8px;display:block;"/>
      <div style="font-size:9px;color:#5a5e78;margin-top:4px;">128px</div>
    </div>
    <div style="text-align:center;">
      <img src="../assets/icon48.png" width="48" height="48" style="border-radius:6px;display:block;"/>
      <div style="font-size:9px;color:#5a5e78;margin-top:4px;">48px</div>
    </div>
    <div style="text-align:center;">
      <img src="../assets/icon16.png" width="16" height="16" style="display:block;"/>
      <div style="font-size:9px;color:#5a5e78;margin-top:4px;">16px</div>
    </div>
  </div>
</body>
</html>
