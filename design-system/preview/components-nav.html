<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #5a5e78; margin-bottom: 6px; }

  /* Nav tabs */
  .nav-tabs { display: flex; background: #1a1d27; border: 1px solid #2c2f45; border-radius: 6px; overflow: hidden; }
  .nav-tab { flex: 1; padding: 7px 12px; background: none; border: none; border-bottom: 2px solid transparent; color: #5a5e78; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; }
  .nav-tab.active { color: #3B82F6; border-bottom-color: #3B82F6; }

  /* Provider grid */
  .provider-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .provider-btn { background: #222536; border: 1px solid #2c2f45; border-radius: 6px; padding: 10px 6px; cursor: pointer; text-align: center; color: #8b8fa8; }
  .provider-btn.active { border-color: #3B82F6; background: #1e3a6e; color: #e2e4f0; }
  .provider-icon { font-size: 18px; display: block; margin-bottom: 4px; }
  .provider-name { font-size: 10px; font-weight: 600; }

  /* Context bar */
  .context-bar { background: #222536; border: 1px solid #2c2f45; border-top: none; padding: 5px 12px; display: flex; align-items: center; gap: 6px; font-size: 11px; color: #5a5e78; }
  .context-count { color: #3B82F6; font-weight: 600; }
</style>
</head>
<body>
  <div>
    <div class="section-label">Navigation Tabs</div>
    <div class="nav-tabs">
      <button class="nav-tab active">Chat</button>
      <button class="nav-tab">History</button>
    </div>
  </div>

  <div>
    <div class="section-label">Provider Grid</div>
    <div class="provider-grid">
      <div class="provider-btn active"><span class="provider-icon">🤖</span><span class="provider-name">OpenAI</span></div>
      <div class="provider-btn"><span class="provider-icon">🧠</span><span class="provider-name">Anthropic</span></div>
      <div class="provider-btn"><span class="provider-icon">💡</span><span class="provider-name">Gemini</span></div>
      <div class="provider-btn"><span class="provider-icon">⚡</span><span class="provider-name">Groq</span></div>
      <div class="provider-btn"><span class="provider-icon">🌊</span><span class="provider-name">Mistral</span></div>
    </div>
  </div>

  <div>
    <div class="section-label">Context Bar</div>
    <div style="border:1px solid #2c2f45;border-radius:6px;overflow:hidden;">
      <div class="context-bar">
        <span>💾</span>
        <span>Using <span class="context-count">7</span> indexed tabs as context</span>
        <span style="margin-left:auto;font-size:8px;">▼</span>
      </div>
    </div>
  </div>
</body>
</html>
