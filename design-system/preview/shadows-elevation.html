<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; padding: 16px; }
  .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #5a5e78; margin-bottom: 10px; margin-top: 14px; }
  .section-label:first-child { margin-top: 0; }
  .stack { display: flex; gap: 8px; align-items: flex-end; }
  .layer { border-radius: 6px; border: 1px solid #2c2f45; padding: 10px 14px; }
  .layer-name { font-size: 10px; font-weight: 600; color: #e2e4f0; }
  .layer-value { font-size: 10px; color: #5a5e78; font-family: 'JetBrains Mono','Fira Code',monospace; margin-top: 2px; }
  .focus-demo { display: flex; gap: 10px; flex-wrap: wrap; }
  .input-demo { background: #0f1117; border: 1px solid #2c2f45; border-radius: 10px; padding: 7px 11px; font-size: 12px; color: #8b8fa8; font-family: inherit; }
  .input-focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
  .dot-glow { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 5px #22c55e; }
  .dot-row { display: flex; align-items: center; gap: 8px; }
  .dot-label { font-size: 11px; color: #8b8fa8; }
</style>
</head>
<body>
  <div class="section-label">Surface Elevation (no box-shadow)</div>
  <div class="stack">
    <div class="layer" style="background:#0f1117;">
      <div class="layer-name">bg</div>
      <div class="layer-value">#0f1117</div>
    </div>
    <div class="layer" style="background:#1a1d27;">
      <div class="layer-name">surface</div>
      <div class="layer-value">#1a1d27</div>
    </div>
    <div class="layer" style="background:#222536;">
      <div class="layer-name">surface-2</div>
      <div class="layer-value">#222536</div>
    </div>
    <div class="layer" style="background:#2c2f45;">
      <div class="layer-name">border</div>
      <div class="layer-value">#2c2f45</div>
    </div>
  </div>

  <div class="section-label">Focus Ring</div>
  <div class="focus-demo">
    <div>
      <div style="font-size:10px;color:#5a5e78;margin-bottom:4px;">Unfocused</div>
      <div class="input-demo">Ask a question...</div>
    </div>
    <div>
      <div style="font-size:10px;color:#5a5e78;margin-bottom:4px;">Focused</div>
      <div class="input-demo input-focus">Ask a question...</div>
    </div>
  </div>

  <div class="section-label">Status Dot Glow</div>
  <div style="display:flex;flex-direction:column;gap:7px;">
    <div class="dot-row">
      <div class="dot-glow"></div>
      <span class="dot-label">Ready — <code style="font-family:monospace;font-size:10px;color:#5a5e78;">box-shadow: 0 0 5px #22c55e</code></span>
    </div>
    <div class="dot-row">
      <div style="width:10px;height:10px;border-radius:50%;background:#5a5e78;"></div>
      <span class="dot-label">No glow — default/muted states</span>
    </div>
  </div>
</body>
</html>
