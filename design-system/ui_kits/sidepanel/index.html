<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Omni-Context — UI Kit v2</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ── Reset ──────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button, input, textarea, select { font-family: inherit; }

/* ── Design tokens ──────────────────────────────────────────────────────── */
:root {
  /* Backgrounds */
  --bg-base:      #0c0c0e;  /* page bg */
  --bg-raised:    #111113;  /* panel bg */
  --bg-overlay:   #18181b;  /* header, toolbar */
  --bg-subtle:    #1c1c1f;  /* hover row, input bg */
  --bg-muted:     #27272a;  /* border-level elevation */

  /* Borders */
  --border-base:  #27272a;
  --border-dim:   #1f1f22;
  --border-focus: #3b82f6;

  /* Text */
  --text-primary:   #fafafa;
  --text-secondary: #a1a1aa;
  --text-tertiary:  #52525b;
  --text-disabled:  #3f3f46;
  --text-link:      #60a5fa;

  /* Accent */
  --accent:         #3b82f6;
  --accent-dim:     rgba(59,130,246,0.12);
  --accent-border:  rgba(59,130,246,0.35);

  /* Semantic */
  --ok:             #22c55e;
  --ok-bg:          rgba(34,197,94,0.08);
  --ok-border:      rgba(34,197,94,0.2);
  --warn:           #f59e0b;
  --warn-bg:        rgba(245,158,11,0.08);
  --warn-border:    rgba(245,158,11,0.2);
  --error:          #f87171;
  --error-bg:       rgba(248,113,113,0.08);
  --error-border:   rgba(248,113,113,0.2);

  /* Radius */
  --r-none:  0px;
  --r-xs:    3px;
  --r-sm:    5px;
  --r-md:    7px;
  --r-lg:    10px;
  --r-pill:  999px;

  /* Spacing */
  --sp-1: 4px;
  --sp-2: 6px;
  --sp-3: 8px;
  --sp-4: 10px;
  --sp-5: 12px;
  --sp-6: 16px;
  --sp-7: 20px;
  --sp-8: 24px;

  /* Typography */
  --font-sans: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --font-mono: 'JetBrains Mono','Fira Code','Cascadia Code',monospace;

  /* Transitions */
  --t-fast:  80ms ease;
  --t-base:  140ms ease;
}

/* ── Google Font: Inter ─────────────────────────────────────────────────── */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap');

/* ── Keyframes ──────────────────────────────────────────────────────────── */
@keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
@keyframes shimmer  {
  0%   { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
@keyframes spin     { to { transform: rotate(360deg); } }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.35} }

/* ── Page layout ────────────────────────────────────────────────────────── */
body {
  background: #080809;
  font-family: var(--font-sans);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 32px 64px;
  gap: 32px;
  flex-wrap: wrap;
}

/* ── Panel shell ────────────────────────────────────────────────────────── */
.panel {
  width: 360px;
  height: 620px;
  background: var(--bg-raised);
  border: 1px solid var(--border-base);
  border-radius: var(--r-lg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: relative;
}

.options-panel {
  width: 480px;
  height: 620px;
  background: var(--bg-raised);
  border: 1px solid var(--border-base);
  border-radius: var(--r-lg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.panel-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 10px;
  text-align: center;
}

/* ── Scrollbar ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-base); border-radius: 99px; }

/* ── Skeleton shimmer ───────────────────────────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--bg-overlay) 25%, var(--bg-subtle) 50%, var(--bg-overlay) 75%);
  background-size: 800px 100%;
  animation: shimmer 1.6s infinite linear;
  border-radius: var(--r-xs);
}
</style>
</head>
<body>
<div id="root-chat-panel"></div>
<div id="root-history-panel"></div>
<div id="root-options-panel"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

/* ══════════════════════════════════════════════════════════════════════════
   DESIGN TOKENS (JS mirror for inline styles)
═══════════════════════════════════════════════════════════════════════════ */
const T = {
  bgBase:    '#0c0c0e',
  bgRaised:  '#111113',
  bgOverlay: '#18181b',
  bgSubtle:  '#1c1c1f',
  bgMuted:   '#27272a',

  borderBase:  '#27272a',
  borderDim:   '#1f1f22',
  borderFocus: '#3b82f6',

  textPrimary:   '#fafafa',
  textSecondary: '#a1a1aa',
  textTertiary:  '#52525b',
  textDisabled:  '#3f3f46',
  textLink:      '#60a5fa',

  accent:       '#3b82f6',
  accentDim:    'rgba(59,130,246,0.12)',
  accentBorder: 'rgba(59,130,246,0.35)',

  ok:          '#22c55e',
  okBg:        'rgba(34,197,94,0.08)',
  okBorder:    'rgba(34,197,94,0.2)',
  warn:        '#f59e0b',
  warnBg:      'rgba(245,158,11,0.08)',
  warnBorder:  'rgba(245,158,11,0.2)',
  error:       '#f87171',
  errorBg:     'rgba(248,113,113,0.08)',
  errorBorder: 'rgba(248,113,113,0.2)',

  // Radius
  rXs: 3, rSm: 5, rMd: 7, rLg: 10, rPill: 999,
};

/* ══════════════════════════════════════════════════════════════════════════
   PRIMITIVE COMPONENTS
═══════════════════════════════════════════════════════════════════════════ */

/* ── Logo mark ──────────────────────────────────────────────────────────── */
function LogoMark({ size = 18 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 18 18" fill="none">
      <rect width="18" height="18" rx="4" fill="#1c1c20"/>
      <rect x="3.5" y="3.5" width="11" height="11" rx="2.5" fill="none" stroke="#52525b" strokeWidth="1.3"/>
      <rect x="6.5" y="6.5" width="5" height="5" rx="1.2" fill={T.accent}/>
    </svg>
  );
}

/* ── Spinner ────────────────────────────────────────────────────────────── */
function Spinner({ size = 12, color = T.textTertiary }) {
  return (
    <svg width={size} height={size} viewBox="0 0 12 12" style={{ animation: 'spin 0.7s linear infinite', display:'block' }}>
      <circle cx="6" cy="6" r="4.5" fill="none" stroke={color} strokeWidth="1.5" strokeDasharray="14 8" strokeLinecap="round"/>
    </svg>
  );
}

/* ── Status dot ─────────────────────────────────────────────────────────── */
function StatusDot({ state }) {
  const colors = { ok: T.ok, loading: T.warn, error: T.error, none: T.textTertiary };
  const color = colors[state] || T.textTertiary;
  return (
    <span style={{
      display: 'inline-block', width: 5, height: 5, borderRadius: '50%',
      background: color, flexShrink: 0,
      animation: state === 'loading' ? 'pulse-dot 1.2s ease-in-out infinite' : 'none',
    }} />
  );
}

/* ── Nav tabs ───────────────────────────────────────────────────────────── */
function NavTabs({ tabs, active, onChange }) {
  return (
    <div style={{
      display: 'flex', background: T.bgOverlay,
      borderBottom: `1px solid ${T.borderBase}`, flexShrink: 0,
      padding: '0 12px',
    }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => onChange(t.id)} style={{
          background: 'none', border: 'none', cursor: 'pointer',
          padding: '9px 2px', marginRight: 18,
          fontSize: 12, fontWeight: 500, letterSpacing: '-0.01em',
          color: active === t.id ? T.textPrimary : T.textTertiary,
          borderBottom: `1.5px solid ${active === t.id ? T.accent : 'transparent'}`,
          transition: 'color 80ms ease, border-color 80ms ease',
          whiteSpace: 'nowrap',
        }}>{t.label}</button>
      ))}
    </div>
  );
}

/* ── Row item ───────────────────────────────────────────────────────────── */
function Row({ left, right, onClick, dim, style: extraStyle }) {
  const [hover, setHover] = useState(false);
  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        gap: 8, padding: '5px 12px',
        background: hover && onClick ? T.bgSubtle : 'transparent',
        cursor: onClick ? 'pointer' : 'default',
        transition: 'background 80ms ease',
        ...extraStyle,
      }}
    >
      <span style={{ flex: 1, minWidth: 0, fontSize: 12, color: dim ? T.textTertiary : T.textSecondary, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{left}</span>
      {right && <span style={{ fontSize: 11, color: T.textTertiary, flexShrink:0 }}>{right}</span>}
    </div>
  );
}

/* ── Source chip ────────────────────────────────────────────────────────── */
function SourceChip({ label, onClick }) {
  const [hover, setHover] = useState(false);
  return (
    <span
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: 'inline-flex', alignItems: 'center', gap: 4,
        fontSize: 10, fontWeight: 500, letterSpacing: '0.01em',
        padding: '1px 6px', borderRadius: T.rXs,
        background: hover ? T.accentDim : 'transparent',
        border: `1px solid ${hover ? T.accentBorder : T.borderBase}`,
        color: hover ? T.textLink : T.textSecondary,
        cursor: 'pointer', transition: 'all 80ms ease',
        whiteSpace: 'nowrap', flexShrink: 0,
      }}
    >
      <span style={{ fontSize: 8, opacity: 0.7 }}>↗</span>{label}
    </span>
  );
}

/* ── Inline code ────────────────────────────────────────────────────────── */
function InlineCode({ children }) {
  return (
    <code style={{
      fontFamily: "'JetBrains Mono','Fira Code',monospace",
      fontSize: 11, padding: '1px 4px', borderRadius: T.rXs,
      background: T.bgMuted, border: `1px solid ${T.borderDim}`,
      color: T.textSecondary, letterSpacing: 0,
    }}>{children}</code>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════════════════════════ */
function Header({ statusState = 'ok', modelLabel, onSettings }) {
  const statusText = { ok: 'Ready', loading: 'Thinking', error: 'Error', none: 'No key' }[statusState];
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 8,
      padding: '9px 12px 8px',
      background: T.bgOverlay,
      borderBottom: `1px solid ${T.borderBase}`,
      flexShrink: 0,
    }}>
      <LogoMark size={18} />
      <span style={{ fontSize: 12, fontWeight: 600, letterSpacing: '-0.02em', color: T.textPrimary, flex: 1 }}>
        Omni-Context
      </span>

      {/* Model label */}
      {modelLabel && (
        <span style={{
          fontSize: 10, fontWeight: 500, color: T.textTertiary,
          background: T.bgSubtle, border: `1px solid ${T.borderBase}`,
          borderRadius: T.rXs, padding: '2px 6px', letterSpacing: '0.01em',
        }}>{modelLabel}</span>
      )}

      {/* Status */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 4, padding: '2px 7px', borderRadius: T.rPill, background: T.bgSubtle, border: `1px solid ${T.borderBase}` }}>
        {statusState === 'loading'
          ? <Spinner size={9} color={T.warn} />
          : <StatusDot state={statusState} />}
        <span style={{ fontSize: 10, fontWeight: 500, color: T.textTertiary }}>{statusText}</span>
      </div>

      {/* Settings */}
      <button onClick={onSettings} style={{
        background: 'none', border: `1px solid transparent`, borderRadius: T.rSm,
        color: T.textTertiary, cursor: 'pointer', padding: '3px 5px',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        transition: 'color 80ms, border-color 80ms, background 80ms',
      }}
        onMouseEnter={e => { e.currentTarget.style.color = T.textSecondary; e.currentTarget.style.borderColor = T.borderBase; e.currentTarget.style.background = T.bgSubtle; }}
        onMouseLeave={e => { e.currentTarget.style.color = T.textTertiary; e.currentTarget.style.borderColor = 'transparent'; e.currentTarget.style.background = 'none'; }}
      >
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <circle cx="6.5" cy="6.5" r="2" stroke="currentColor" strokeWidth="1.2"/>
          <path d="M6.5 1v1.5M6.5 10.5V12M1 6.5h1.5M10.5 6.5H12M2.4 2.4l1.06 1.06M9.54 9.54l1.06 1.06M9.54 3.46 8.48 4.52M3.46 9.54 2.4 10.6" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
        </svg>
      </button>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   CONTEXT BAR
═══════════════════════════════════════════════════════════════════════════ */
function ContextBar({ tabs }) {
  const [open, setOpen] = useState(false);
  const relevant = tabs.filter(t => t.score >= 0.1);

  return (
    <div style={{ borderTop: `1px solid ${T.borderBase}`, background: T.bgOverlay, flexShrink: 0 }}>
      <button
        onClick={() => setOpen(o => !o)}
        style={{
          width: '100%', background: 'none', border: 'none', cursor: 'pointer',
          display: 'flex', alignItems: 'center', gap: 6,
          padding: '6px 12px', textAlign: 'left',
        }}
      >
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none" style={{ flexShrink:0 }}>
          <rect x="1" y="3" width="9" height="7" rx="1.2" stroke={T.textTertiary} strokeWidth="1.1"/>
          <path d="M1 5.5h9" stroke={T.textTertiary} strokeWidth="1.1"/>
          <path d="M3.5 1v2M7.5 1v2" stroke={T.textTertiary} strokeWidth="1.1" strokeLinecap="round"/>
        </svg>
        <span style={{ flex: 1, fontSize: 11, color: T.textTertiary, fontWeight: 500 }}>
          {relevant.length} tab{relevant.length !== 1 ? 's' : ''} in context
        </span>
        <svg width="8" height="8" viewBox="0 0 8 8" fill="none" style={{ transform: open ? 'rotate(180deg)' : 'none', transition: 'transform 140ms' }}>
          <path d="M1.5 2.5 4 5l2.5-2.5" stroke={T.textTertiary} strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </button>

      {open && (
        <div style={{ padding: '2px 0 6px' }}>
          {tabs.map((tab, i) => {
            const pct = Math.round(tab.score * 100);
            const color = pct >= 50 ? T.ok : pct >= 20 ? T.warn : T.textTertiary;
            return (
              <Row key={i} left={tab.title}
                right={<span style={{ color, fontSize: 10, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{pct}%</span>}
              />
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   MESSAGES
═══════════════════════════════════════════════════════════════════════════ */

function UserMsg({ text }) {
  return (
    <div style={{ display:'flex', gap:8, animation:'fadeUp 0.14s ease-out' }}>
      <div style={{
        width: 20, height: 20, borderRadius: T.rXs, background: T.bgMuted,
        border: `1px solid ${T.borderBase}`, display:'flex', alignItems:'center',
        justifyContent:'center', flexShrink:0, marginTop:1,
      }}>
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <circle cx="5" cy="3.5" r="2" stroke={T.textTertiary} strokeWidth="1.1"/>
          <path d="M1 9c0-2.2 1.8-4 4-4s4 1.8 4 4" stroke={T.textTertiary} strokeWidth="1.1" strokeLinecap="round"/>
        </svg>
      </div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:10, fontWeight:600, letterSpacing:'0.04em', textTransform:'uppercase', color: T.textTertiary, marginBottom:3 }}>You</div>
        <div style={{ fontSize:12.5, lineHeight:1.65, color: T.textPrimary, whiteSpace:'pre-wrap' }}>{text}</div>
      </div>
    </div>
  );
}

function AssistantMsg({ text, streaming }) {
  const renderText = (t) => {
    if (!t && streaming) return <span style={{ display:'inline-block', width:2, height:13, background:T.accent, verticalAlign:'text-bottom', animation:'blink 0.8s ease-in-out infinite', marginLeft:1 }} />;
    const segs = String(t).split(/(\*\*[^*]+\*\*|`[^`]+`|\[Tab:[^\]]+\])/g);
    const result = segs.map((seg, i) => {
      if (seg.startsWith('**') && seg.endsWith('**')) return <strong key={i} style={{ color: T.textPrimary, fontWeight:600 }}>{seg.slice(2,-2)}</strong>;
      if (seg.startsWith('`') && seg.endsWith('`') && seg.length > 1) return <InlineCode key={i}>{seg.slice(1,-1)}</InlineCode>;
      if (seg.startsWith('[Tab:')) { const c = seg.replace(/\[Tab:\s*|\]/g,'').trim(); return <SourceChip key={i} label={c} />; }
      return seg;
    });
    if (streaming) result.push(<span key="cur" style={{ display:'inline-block', width:2, height:13, background:T.accent, verticalAlign:'text-bottom', animation:'blink 0.8s ease-in-out infinite', marginLeft:1 }} />);
    return result;
  };

  return (
    <div style={{ display:'flex', gap:8, animation:'fadeUp 0.14s ease-out' }}>
      <div style={{
        width:20, height:20, borderRadius: T.rXs, background: T.bgMuted,
        border:`1px solid ${T.borderBase}`, display:'flex', alignItems:'center',
        justifyContent:'center', flexShrink:0, marginTop:1,
      }}>
        <LogoMark size={12} />
      </div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:10, fontWeight:600, letterSpacing:'0.04em', textTransform:'uppercase', color: T.textTertiary, marginBottom:3 }}>Omni-Context</div>
        <div style={{ fontSize:12.5, lineHeight:1.65, color: T.textPrimary }}>{renderText(text)}</div>
      </div>
    </div>
  );
}

/* ── Tab relevance section ──────────────────────────────────────────────── */
function TabRelevance({ tabs }) {
  const [open, setOpen] = useState(false);
  const relevant = tabs.filter(t => t.score >= 0.05);
  return (
    <div style={{ borderLeft:`1.5px solid ${T.borderBase}`, marginLeft:28, paddingLeft:10, animation:'fadeUp 0.14s ease-out' }}>
      <button onClick={() => setOpen(o=>!o)} style={{
        display:'flex', alignItems:'center', gap:5, background:'none', border:'none',
        cursor:'pointer', padding:'2px 0', marginBottom: open ? 6 : 0,
      }}>
        <svg width="8" height="8" viewBox="0 0 8 8" fill="none" style={{ transform: open ? 'rotate(90deg)' : 'none', transition:'transform 120ms' }}>
          <path d="M2 1.5l3 2.5-3 2.5" stroke={T.textTertiary} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
        <span style={{ fontSize:11, fontWeight:500, color:T.textTertiary }}>
          {relevant.length} relevant tab{relevant.length!==1?'s':''}
        </span>
      </button>
      {open && (
        <div style={{ display:'flex', flexDirection:'column', gap:1 }}>
          {tabs.map((tab, i) => {
            const pct = Math.round(tab.score*100);
            const dim = pct < 5;
            return (
              <div key={i} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:8, padding:'3px 0' }}>
                <span style={{ fontSize:11, color: dim ? T.textTertiary : T.textSecondary, flex:1, minWidth:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{tab.title}</span>
                <span style={{ fontSize:10, fontWeight:600, color: pct>=50?T.ok:pct>=10?T.warn:T.textTertiary, flexShrink:0, fontVariantNumeric:'tabular-nums' }}>{pct}%</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ── Empty state ────────────────────────────────────────────────────────── */
function EmptyState({ hasKey }) {
  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center', padding:'0 24px 32px' }}>
      <div style={{ marginBottom:20 }}>
        <div style={{ width:32, height:32, borderRadius:T.rMd, background:T.bgSubtle, border:`1px solid ${T.borderBase}`, display:'flex', alignItems:'center', justifyContent:'center', marginBottom:12 }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="4.5" stroke={T.textTertiary} strokeWidth="1.3"/>
            <path d="M10.5 10.5 13 13" stroke={T.textTertiary} strokeWidth="1.3" strokeLinecap="round"/>
          </svg>
        </div>
        <div style={{ fontSize:13, fontWeight:600, color:T.textPrimary, marginBottom:6, letterSpacing:'-0.02em' }}>Ask across your tabs</div>
        <div style={{ fontSize:12, color:T.textSecondary, lineHeight:1.6 }}>
          Browse some pages, then ask a question. Omni-Context indexes your open tabs and uses AI to answer.
        </div>
      </div>
      {!hasKey && (
        <div style={{
          padding:'10px 12px', borderRadius:T.rSm,

const TABS = [
  { title: 'anthropics/anthropic-sdk-python',    score: 0.91 },
  { title: 'MDN Web Docs — fetch()',             score: 0.77 },
  { title: 'Hacker News | LLM streaming',        score: 0.44 },
  { title: 'Stack Overflow — async/await',       score: 0.06 },
];

const RESPONSE = `The **Anthropic SDK** [Tab: anthropics/anthropic-sdk-python] exposes \`client.messages.stream()\` which yields \`RawContentBlockDeltaEvent\` objects. Each delta carries a \`text\` field you pipe into the DOM incrementally.

Combined with the \`ReadableStream\` pattern from [Tab: MDN Web Docs — fetch()], you avoid buffering the full response — chunks land in ~20ms intervals at typical throughput.`;

function ChatView({ hasKey, onOpenSettings }) {
  const [msgs, setMsgs] = useState([]);
  const [streaming, setStreaming] = useState(false);
  const [streamText, setStreamText] = useState('');
  const [showSkeleton, setShowSkeleton] = useState(false);
  const [showRelevance, setShowRelevance] = useState(false);
  const [research, setResearch] = useState(false);
  const [error, setError] = useState(null);
  const scrollRef = useRef();

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [msgs, streamText, showSkeleton]);

  const handleSend = useCallback((text) => {
    if (!hasKey) { onOpenSettings(); return; }
    setMsgs(prev => [...prev, { role:'user', text }]);
    setError(null); setShowRelevance(false);
    setShowSkeleton(true); setStreaming(false); setStreamText('');

    // Simulate: skeleton → relevance → stream
    setTimeout(() => {
      setShowSkeleton(false); setShowRelevance(true); setStreaming(true);
      let i = 0;
      const tick = setInterval(() => {
        i += 4; setStreamText(RESPONSE.slice(0, i));
        if (i >= RESPONSE.length) {
          clearInterval(tick);
          setMsgs(prev => [...prev, { role:'assistant', text: RESPONSE }]);
          setStreamText(''); setStreaming(false); setShowRelevance(false);
        }
      }, 14);
    }, 600);
  }, [hasKey, onOpenSettings]);

  const empty = msgs.length === 0 && !showSkeleton;

  return (
    <div style={{ display:'flex', flexDirection:'column', flex:1, minHeight:0, overflow:'hidden' }}>
      <div ref={scrollRef} style={{ flex:1, overflowY:'auto', padding:'14px 12px', display:'flex', flexDirection:'column', gap:12 }}>
        {empty && <EmptyState hasKey={hasKey} />}
        {msgs.map((m,i) => m.role==='user'
          ? <UserMsg key={i} text={m.text} />
          : <AssistantMsg key={i} text={m.text} />
        )}
        {showSkeleton && <SkeletonMsg />}
        {showRelevance && <TabRelevance tabs={TABS} />}
        {streaming && <AssistantMsg text={streamText} streaming />}
        {error && <ErrorMsg text={error} />}
      </div>
      <ContextBar tabs={TABS} />
      <InputArea onSend={handleSend} disabled={streaming||showSkeleton} researchMode={research} onResearchToggle={() => setResearch(r=>!r)} />
    </div>
  );
}

      </SettingsSection>

      <SettingsSection title="Tab Index">
        <p style={{ fontSize:12, color:T.textSecondary, marginBottom:10, lineHeight:1.6 }}>
          Re-scan all currently open tabs to refresh the index.
        </p>
        <button style={{
          padding:'7px 14px', borderRadius:T.rSm, border:`1px solid ${T.borderBase}`,
          cursor:'pointer', background:T.bgSubtle, color:T.textSecondary, fontSize:12, fontWeight:500,
        }}>Re-index tabs</button>
      </SettingsSection>

      <SettingsSection title="Storage">
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 10px', borderRadius:T.rSm, background:T.bgSubtle, border:`1px solid ${T.borderBase}`, marginBottom:8 }}>
          <span style={{ fontSize:12, color:T.textSecondary }}>Chat history</span>
          <span style={{ fontSize:11, color:T.textTertiary, fontVariantNumeric:'tabular-nums' }}>2.4 MB</span>
        </div>
        <button style={{
          padding:'7px 14px', borderRadius:T.rSm, border:`1px solid ${T.errorBorder}`,
          cursor:'pointer', background:'transparent', color:T.error, fontSize:12, fontWeight:500,
          transition:'background 80ms',
        }}
          onMouseEnter={e=>e.currentTarget.style.background=T.errorBg}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}
        >Delete all history</button>
      </SettingsSection>

      {/* Privacy */}
      <div style={{ padding:'10px 12px', borderRadius:T.rSm, background:T.okBg, border:`1px solid ${T.okBorder}`, fontSize:11, color:T.textSecondary, lineHeight:1.6 }}>
        <span style={{ fontWeight:600, color:T.ok }}>100% private.</span> Your API key is stored locally and sent only to your chosen provider. No backend, no telemetry.
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   ROOT APPS
═══════════════════════════════════════════════════════════════════════════ */
function ChatApp() {
  const [view, setView] = useState('chat');
  const [showOptions, setShowOptions] = useState(false);

  return (
    <div>
      <div className="panel-label">Chat view</div>
      <div className="panel">
        {showOptions ? (
          <>
            <Header statusState="ok" modelLabel="claude-3-5-haiku" onSettings={()=>setShowOptions(false)} />
            <OptionsPage onBack={()=>setShowOptions(false)} />
          </>
        ) : (
          <>
            <Header statusState="ok" modelLabel="claude-3-5-haiku" onSettings={()=>setShowOptions(true)} />
            <NavTabs tabs={[{id:'chat',label:'Chat'},{id:'history',label:'History'}]} active={view} onChange={setView} />
            {view==='chat' && <ChatView hasKey={true} onOpenSettings={()=>setShowOptions(true)} />}
            {view==='history' && <HistoryView />}
          </>
        )}
      </div>
    </div>
  );
}

function HistoryApp() {
  return (
    <div>
      <div className="panel-label">History view</div>
      <div className="panel">
        <Header statusState="ok" modelLabel="gpt-4o-mini" onSettings={()=>{}} />
        <NavTabs tabs={[{id:'chat',label:'Chat'},{id:'history',label:'History'}]} active="history" onChange={()=>{}} />
        <HistoryView />
      </div>
    </div>
  );
}

function OptionsApp() {
  return (
    <div>
      <div className="panel-label">Options / Settings</div>
      <div className="options-panel">
        <Header statusState="none" onSettings={()=>{}} />
        <OptionsPage />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root-chat-panel')).render(<ChatApp />);
ReactDOM.createRoot(document.getElementById('root-history-panel')).render(<HistoryApp />);
ReactDOM.createRoot(document.getElementById('root-options-panel')).render(<OptionsApp />);
</script>
</body>
</html>
